<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Content Generator</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    padding: 20px;
}

.hidden { display: none; }

.container {
    display: flex;
    gap: 20px;
}

.box {
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
    flex: 1;
}

button {
    padding: 10px;
    background: #6366f1;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

input, select, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container">

<!-- LEFT -->
<div class="box">
<h3>Generator</h3>

<select id="content-type">
<option value="cerita">Cerita</option>
<option value="islami">Islami</option>
</select>

<input id="topic" placeholder="Topik">

<select id="language">
<option>Bahasa Indonesia</option>
<option>Lainnya</option>
</select>

<input id="language-manual" class="hidden" placeholder="Isi bahasa">

<input type="range" id="paragraph-slider" min="1" max="8" value="2">
<span id="paragraph-label">5</span>

<textarea id="extra-prompt" placeholder="Tambahan"></textarea>

<button id="btn-generate">Buat Konten</button>
</div>

<!-- RIGHT -->
<div class="box">
<h3>Hasil</h3>
<div id="output-content">Belum ada</div>
</div>

</div>

<script>
(function(){

const CONFIG = {
    storageKey: 'api_keys',
    model: 'gemini-2.5-flash',
    baseUrl: 'https://generativelanguage.googleapis.com/v1beta/models/'
};

const paragraphMap = {1:3,2:5,3:8,4:10,5:15,6:20,7:25,8:30};

class APIKeyManager {
    constructor(){
        this.keys = JSON.parse(localStorage.getItem(CONFIG.storageKey) || '[]');
    }

    getKey(){
        return this.keys[0] || null;
    }

    addKey(key){
        this.keys.push(key);
        localStorage.setItem(CONFIG.storageKey, JSON.stringify(this.keys));
    }
}

async function callAPI(prompt, key){
    const res = await fetch(`${CONFIG.baseUrl}${CONFIG.model}:generateContent?key=${key}`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
            contents:[{parts:[{text:prompt}]}]
        })
    });

    const data = await res.json();
    return data.candidates?.[0]?.content?.parts?.[0]?.text || 'Error';
}

function generatePrompt(topic, lang, pCount){
    return `Tulis ${pCount} paragraf tentang ${topic} dalam bahasa ${lang}`;
}

class App {
    constructor(){
        this.api = new APIKeyManager();

        this.btn = document.getElementById('btn-generate');
        this.output = document.getElementById('output-content');

        this.langSelect = document.getElementById('language');
        this.langManual = document.getElementById('language-manual');

        this.slider = document.getElementById('paragraph-slider');
        this.label = document.getElementById('paragraph-label');

        this.init();
    }

    init(){
        this.btn.addEventListener('click', () => this.generate());

        this.langSelect.addEventListener('change', ()=>{
            if(this.langSelect.value === 'Lainnya'){
                this.langManual.classList.remove('hidden');
            } else {
                this.langManual.classList.add('hidden');
            }
        });

        this.slider.addEventListener('input', ()=>{
            this.label.textContent = paragraphMap[this.slider.value];
        });
    }

    async generate(){
        let key = this.api.getKey();

        if(!key){
            key = prompt("Masukkan API Key:");
            this.api.addKey(key);
        }

        const topic = document.getElementById('topic').value;
        let lang = this.langSelect.value;

        if(lang === 'Lainnya'){
            lang = this.langManual.value;
        }

        const pCount = paragraphMap[this.slider.value];

        const promptText = generatePrompt(topic, lang, pCount);

        this.output.innerText = "Loading...";

        try{
            const res = await callAPI(promptText, key);
            this.output.innerText = res;
        }catch(e){
            this.output.innerText = "Error";
        }
    }
}

new App();

})();
</script>

</body>
</html>
